<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Argentina</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --text: #e6edf3;
    --muted: #8b949e;
    --danger: #f85149;
    --gold: #d29922;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    z-index: 1000;
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    letter-spacing: 0.04em;
    color: var(--text);
  }

  header .badge {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(88,166,255,0.12);
    border: 1px solid rgba(88,166,255,0.25);
    padding: 2px 8px;
    border-radius: 20px;
  }

  header .stats {
    margin-left: auto;
    display: flex;
    gap: 20px;
  }

  header .stat {
    text-align: right;
  }

  header .stat-value {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    color: var(--accent2);
  }

  header .stat-label {
    font-size: 0.68rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  #map {
    flex: 1;
    background: #0d1117;
  }

  .sidebar {
    width: 280px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  .sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-header h2 {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .search-box {
    position: relative;
  }

  .search-box input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px 7px 30px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box input:focus {
    border-color: var(--accent);
  }

  .search-box::before {
    content: '⌕';
    position: absolute;
    left: 9px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 1rem;
    pointer-events: none;
  }

  .province-list {
    overflow-y: auto;
    flex: 1;
    padding: 8px 0;
  }

  .province-list::-webkit-scrollbar { width: 4px; }
  .province-list::-webkit-scrollbar-track { background: transparent; }
  .province-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .prov-item {
    display: flex;
    align-items: center;
    padding: 8px 16px;
    cursor: pointer;
    transition: background 0.15s;
    gap: 10px;
  }

  .prov-item:hover { background: rgba(88,166,255,0.06); }
  .prov-item.active { background: rgba(88,166,255,0.12); }

  .prov-dot {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .prov-name {
    flex: 1;
    font-size: 0.82rem;
    color: var(--text);
  }

  .prov-value {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.82rem;
    color: var(--accent);
  }

  .legend {
    padding: 14px 16px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .legend-title {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .legend-bar {
    height: 8px;
    border-radius: 4px;
    background: linear-gradient(to right, #0d2137, #1a4a7a, #2563b0, #3b82f6, #58a6ff);
    margin-bottom: 6px;
  }

  .legend-labels {
    display: flex;
    justify-content: space-between;
    font-size: 0.7rem;
    color: var(--muted);
  }

  /* Leaflet popup override */
  .leaflet-popup-content-wrapper {
    background: #1c2128 !important;
    border: 1px solid #30363d !important;
    border-radius: 8px !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important;
    color: #e6edf3 !important;
    padding: 0 !important;
  }

  .leaflet-popup-tip { background: #1c2128 !important; }
  .leaflet-popup-content { margin: 0 !important; }

  .popup-inner { padding: 14px 16px; min-width: 180px; }

  .popup-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    margin-bottom: 4px;
    color: #e6edf3;
  }

  .popup-province {
    font-size: 0.75rem;
    color: #8b949e;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .popup-kv {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.82rem;
    padding: 4px 0;
    border-top: 1px solid #30363d;
  }

  .popup-key { color: #8b949e; }
  .popup-val { font-weight: 600; color: #58a6ff; font-family: 'Syne', sans-serif; }

  .leaflet-container { background: #0d1117 !important; }

  .info-panel {
    position: absolute;
    top: 12px;
    left: 12px;
    z-index: 900;
    background: rgba(22,27,34,0.92);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    backdrop-filter: blur(8px);
    min-width: 200px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .info-panel.visible { opacity: 1; }
  .info-panel-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; margin-bottom: 4px; }
  .info-panel-value { font-size: 0.85rem; color: var(--muted); }
  .info-panel-val-num { color: var(--accent); font-weight: 600; }

  .toggle-cities {
    position: absolute;
    bottom: 24px;
    left: 12px;
    z-index: 900;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
  }

  .toggle-cities:hover { border-color: var(--accent); color: var(--accent); }
  .toggle-cities.off { opacity: 0.5; }
</style>
</head>
<body>

<header>
  <h1>🗺 Argentina · Mapa Interactivo</h1>
  <span class="badge">Demo</span>
  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="stat-cities">368</div>
      <div class="stat-label">Ciudades</div>
    </div>
    <div class="stat">
      <div class="stat-value">24</div>
      <div class="stat-label">Provincias</div>
    </div>
  </div>
</header>

<div class="main">
  <div id="map">
    <div class="info-panel" id="info-panel">
      <div class="info-panel-title" id="info-title"></div>
      <div class="info-panel-value">Valor: <span class="info-panel-val-num" id="info-value"></span></div>
    </div>
    <button class="toggle-cities" id="toggle-btn" onclick="toggleCities()">🏙 Ocultar ciudades</button>
  </div>
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>Provincias</h2>
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Buscar provincia..." oninput="filterProvincias()">
      </div>
    </div>
    <div class="province-list" id="province-list"></div>
    <div class="legend">
      <div class="legend-title">Escala de valores</div>
      <div class="legend-bar"></div>
      <div class="legend-labels">
        <span id="leg-min">0</span>
        <span id="leg-max">100</span>
      </div>
    </div>
  </div>
</div>

  zoom: 4,
  zoomControl: true,
  attributionControl: false,

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_matter_only_labels/{z}/{x}/{y}{r}.png', {

// Calcular rango de valores
const valores = Object.values(DATOS_PROVINCIAS);
const minVal = Math.min(...valores);
const maxVal = Math.max(...valores);

document.getElementById('leg-min').textContent = minVal;
document.getElementById('leg-max').textContent = maxVal;

function getColor(val) {
  if (val === undefined) return '#2a2a2a';
  const t = (val - minVal) / (maxVal - minVal || 1);
  const r = Math.round(13 + t * (88 - 13));
  const g = Math.round(33 + t * (166 - 33));
  const b = Math.round(23 + t * (255 - 23));
  return `rgb(${r},${g},${b})`;
}

// Cargar GeoJSON desde la copia local embebida (TopoJSON → convertido inline)
// Usamos el archivo que el usuario ya tiene
const GEO_URL = 'https://raw.githubusercontent.com/codeforamerica/click_that_hood/master/public/data/argentina-states.geojson';

let geojsonLayer;
let provinceLayers = {};

fetch(GEO_URL)
  .then(r => r.json())
  .then(data => {
    geojsonLayer = L.geoJSON(data, {
      style: feature => {
        const name = feature.properties.name || feature.properties.NAME_1 || '';
        const val = DATOS_PROVINCIAS[name];
        return {
          fillColor: getColor(val),
          fillOpacity: 0.75,
          color: '#58a6ff',
          weight: 1,
          opacity: 0.4,
        };
      },
      onEachFeature: (feature, layer) => {
        const name = feature.properties.name || feature.properties.NAME_1 || '';
        provinceLayers[name] = layer;

        layer.on('mouseover', function(e) {
          this.setStyle({ weight: 2, opacity: 0.9, fillOpacity: 0.9 });
          const val = DATOS_PROVINCIAS[name];

          document.getElementById('info-value').textContent = val !== undefined ? val : 'Sin datos';

          highlightSidebar(name);
        });

        layer.on('mouseout', function(e) {
          geojsonLayer.resetStyle(this);
          document.getElementById('info-panel').classList.remove('visible');
          highlightSidebar(null);
        });

        layer.on('click', function(e) {
          map.fitBounds(this.getBounds(), { padding: [40, 40] });
        });
      }
    }).addTo(map);

    buildSidebar(data);
  })
  .catch(() => {
    document.getElementById('map').insertAdjacentHTML('afterbegin',
      '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#8b949e;text-align:center;z-index:999;">' +
      '<div style="font-size:2rem;margin-bottom:8px;">🌐</div>' +
      '<div style="font-family:Syne,sans-serif;font-weight:700;">Necesitás conexión a internet</div>' +
      '<div style="font-size:0.8rem;margin-top:4px;">para cargar las provincias</div></div>');
  });

// Ciudades
let citiesVisible = true;
let cityMarkers = [];

CIUDADES.forEach(c => {
  const r = Math.max(4, Math.min(14, Math.log(c.pop / 5000) * 1.5));
  const marker = L.circleMarker([c.lat, c.lng], {
    radius: r,
    fillColor: '#f0c060',
    color: '#0d1117',
    weight: 1.5,
    fillOpacity: 0.85,
  });

  const val = DATOS_PROVINCIAS[c.prov];
  marker.bindPopup(`
    <div class="popup-inner">
      <div class="popup-title">${c.ciudad}</div>
      <div class="popup-province">${c.prov}</div>
      <div class="popup-kv">
        <span class="popup-key">Población</span>
        <span class="popup-val">${c.pop.toLocaleString('es-AR')}</span>
      </div>
      <div class="popup-kv">
        <span class="popup-key">${LABEL_VALOR} (provincia)</span>
        <span class="popup-val">${val !== undefined ? val : '—'}</span>
      </div>
    </div>
  `, { maxWidth: 240 });

  marker.addTo(map);
  cityMarkers.push(marker);
});

function toggleCities() {
  citiesVisible = !citiesVisible;
  const btn = document.getElementById('toggle-btn');
  cityMarkers.forEach(m => {
    if (citiesVisible) m.addTo(map);
    else map.removeLayer(m);
  });
  btn.textContent = citiesVisible ? '🏙 Ocultar ciudades' : '🏙 Mostrar ciudades';
  btn.classList.toggle('off', !citiesVisible);
}

// Sidebar
function buildSidebar(data) {
  const container = document.getElementById('province-list');
  const sorted = Object.entries(DATOS_PROVINCIAS).sort((a,b) => b[1]-a[1]);

  sorted.forEach(([name, val]) => {
    const item = document.createElement('div');
    item.className = 'prov-item';
    item.dataset.name = name;
    item.innerHTML = `
      <div class="prov-dot" style="background:${getColor(val)}"></div>
      <span class="prov-name">${name}</span>
      <span class="prov-value">${val}</span>
    `;
    item.onclick = () => {
      const layer = provinceLayers[name];
      if (layer) {
        map.fitBounds(layer.getBounds(), { padding: [60, 60] });
        document.querySelectorAll('.prov-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
      }
    };
    container.appendChild(item);
  });
}

function highlightSidebar(name) {
  document.querySelectorAll('.prov-item').forEach(i => {
    i.classList.toggle('active', i.dataset.name === name);
    if (i.dataset.name === name) i.scrollIntoView({ block: 'nearest' });
  });
}

function filterProvincias() {
  const q = document.getElementById('search-input').value.toLowerCase();
  document.querySelectorAll('.prov-item').forEach(i => {
    i.style.display = i.dataset.name.toLowerCase().includes(q) ? '' : 'none';
  });
}
</script>
</body>
