<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Argentina</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--border:#30363d;
  --accent:#58a6ff;--accent2:#3fb950;--text:#e6edf3;--muted:#8b949e;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{padding:12px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
header h1{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;letter-spacing:.04em}
.badge{font-size:.7rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);background:rgba(88,166,255,.12);border:1px solid rgba(88,166,255,.25);padding:2px 8px;border-radius:20px}
.stats{margin-left:auto;display:flex;gap:18px}
.stat-value{font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;color:var(--accent2);text-align:right}
.stat-label{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;text-align:right}
.main{display:flex;flex:1;overflow:hidden}
#mapwrap{flex:1;overflow:hidden;position:relative;cursor:grab}
#mapwrap:active{cursor:grabbing}
svg#map{width:100%;height:100%;display:block}
.prov-path{transition:opacity .15s}
.prov-path:hover{opacity:.85;stroke-width:1.5}
.city-dot{cursor:pointer;transition:r .15s}
.city-dot:hover{stroke-width:2}
.sidebar{width:270px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.sb-head{padding:14px 14px 10px;border-bottom:1px solid var(--border)}
.sb-head h2{font-family:'Syne',sans-serif;font-weight:700;font-size:.78rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.search-box{position:relative}
.search-box input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 10px 6px 28px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.8rem;outline:none}
.search-box input:focus{border-color:var(--accent)}
.search-box::before{content:"⌕";position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.95rem;pointer-events:none}
.prov-list{overflow-y:auto;flex:1;padding:6px 0}
.prov-list::-webkit-scrollbar{width:3px}
.prov-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.prov-item{display:flex;align-items:center;padding:7px 14px;cursor:pointer;transition:background .12s;gap:9px}
.prov-item:hover{background:rgba(88,166,255,.06)}
.prov-item.active{background:rgba(88,166,255,.13)}
.prov-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.prov-name{flex:1;font-size:.8rem}
.prov-val{font-family:'Syne',sans-serif;font-weight:600;font-size:.8rem;color:var(--accent)}
.legend{padding:12px 14px;border-top:1px solid var(--border);flex-shrink:0}
.legend-title{font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px}
.legend-bar{height:7px;border-radius:4px;background:linear-gradient(to right,#0a2540,#1a4a8a,#2e6fc4,#58a6ff);margin-bottom:5px}
.legend-labels{display:flex;justify-content:space-between;font-size:.68rem;color:var(--muted)}
#tooltip{position:fixed;pointer-events:none;background:#1c2128;border:1px solid var(--border);border-radius:8px;padding:10px 13px;font-size:.82rem;z-index:999;opacity:0;transition:opacity .15s;min-width:160px}
#tooltip .tt-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.92rem;margin-bottom:2px}
#tooltip .tt-sub{color:var(--muted);font-size:.72rem;margin-bottom:7px;text-transform:uppercase;letter-spacing:.04em}
#tooltip .tt-row{display:flex;justify-content:space-between;gap:16px;border-top:1px solid var(--border);padding-top:5px;margin-top:2px}
#tooltip .tt-key{color:var(--muted)}
#tooltip .tt-val{font-weight:600;color:var(--accent);font-family:'Syne',sans-serif}
.btn-toggle{position:absolute;bottom:16px;left:12px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-family:'DM Sans',sans-serif;font-size:.78rem;color:var(--text);cursor:pointer;z-index:10}
.btn-toggle:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>
<header>
  <h1>🗺 Argentina &middot; Mapa Interactivo</h1>
  <span class="badge">Demo</span>
  <div class="stats">
    <div class="stat"><div class="stat-value">37</div><div class="stat-label">Ciudades</div></div>
    <div class="stat"><div class="stat-value">24</div><div class="stat-label">Provincias</div></div>
  </div>
</header>
<div class="main">
  <div id="mapwrap">
    <svg id="map" viewBox="0 0 660 860" xmlns="http://www.w3.org/2000/svg">
      <g id="provinces"></g>
      <g id="cities"></g>
    </svg>
    <button class="btn-toggle" id="btn-cities" onclick="toggleCities()">🏙 Ocultar ciudades</button>
  </div>
  <div class="sidebar">
    <div class="sb-head">
      <h2>Provincias</h2>
      <div class="search-box"><input type="text" id="search" placeholder="Buscar..." oninput="filterList()"></div>
    </div>
    <div class="prov-list" id="prov-list"></div>
    <div class="legend">
      <div class="legend-title">Escala de valores</div>
      <div class="legend-bar"></div>
      <div class="legend-labels"><span id="leg-min">0</span><span id="leg-max">100</span></div>
    </div>
  </div>
</div>
<div id="tooltip"></div>

const vals = Object.values(DATOS);
const minV = Math.min(...vals), maxV = Math.max(...vals);
document.getElementById('leg-min').textContent = minV;
document.getElementById('leg-max').textContent = maxV;

function getColor(v) {
  if (v === undefined) return '#2a2a2a';
  const t = (v - minV) / (maxV - minV || 1);
  return `rgb(${Math.round(10+t*48)},${Math.round(37+t*129)},${Math.round(40+t*215)})`;
}

// Draw provinces
const gProv = document.getElementById('provinces');
const pathEls = {};
PATHS.forEach(({name, d}) => {
  const val = DATOS[name];
  const el = document.createElementNS('http://www.w3.org/2000/svg','path');
  el.setAttribute('d', d);
  el.setAttribute('fill', getColor(val));
  el.setAttribute('stroke', '#58a6ff');
  el.setAttribute('stroke-width', '0.6');
  el.setAttribute('stroke-opacity', '0.5');
  el.setAttribute('class', 'prov-path');
  el.setAttribute('data-name', name);
  el.addEventListener('mousemove', e => showTip(e, name, null, val));
  el.addEventListener('mouseleave', hideTip);
  el.addEventListener('click', () => highlightProv(name));
  gProv.appendChild(el);
  pathEls[name] = el;
});

// Draw cities
const gCities = document.getElementById('cities');
let citiesOn = true;
CITIES.forEach(({n, cx, cy, r, pop}) => {
  const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
  circle.setAttribute('cx', cx);
  circle.setAttribute('cy', cy);
  circle.setAttribute('r', r);
  circle.setAttribute('fill', '#e8c04a');
  circle.setAttribute('stroke', '#0d1117');
  circle.setAttribute('stroke-width', '1');
  circle.setAttribute('class', 'city-dot');
  circle.setAttribute('data-name', n);
  circle.addEventListener('mousemove', e => showTip(e, n, pop, undefined));
  circle.addEventListener('mouseleave', hideTip);
  gCities.appendChild(circle);
});

// Tooltip
const tip = document.getElementById('tooltip');
function showTip(e, name, pop, val) {
  let html = `<div class="tt-title">${name}</div>`;
  if (pop !== null && pop !== undefined) {
    html += `<div class="tt-sub">Ciudad</div>`;
    html += `<div class="tt-row"><span class="tt-key">Población</span><span class="tt-val">${pop.toLocaleString('es-AR')}</span></div>`;
  } else {
    html += `<div class="tt-sub">Provincia</div>`;
    html += `<div class="tt-row"><span class="tt-key">${LABEL}</span><span class="tt-val">${val !== undefined ? val : '—'}</span></div>`;
  }
  tip.innerHTML = html;
  tip.style.opacity = '1';
  moveTip(e);
}
function moveTip(e) {
  tip.style.left = (e.clientX + 14) + 'px';
  tip.style.top = (e.clientY - 10) + 'px';
}
function hideTip() { tip.style.opacity = '0'; }
document.addEventListener('mousemove', e => { if(tip.style.opacity==='1') moveTip(e); });

// Sidebar
const listEl = document.getElementById('prov-list');
const sorted = Object.entries(DATOS).sort((a,b) => b[1]-a[1]);
sorted.forEach(([name, val]) => {
  const item = document.createElement('div');
  item.className = 'prov-item';
  item.dataset.name = name;
  item.innerHTML = `<div class="prov-dot" style="background:${getColor(val)}"></div><span class="prov-name">${name}</span><span class="prov-val">${val}</span>`;
  item.onclick = () => highlightProv(name);
  listEl.appendChild(item);
});

function highlightProv(name) {
  document.querySelectorAll('.prov-item').forEach(i => i.classList.toggle('active', i.dataset.name === name));
  document.querySelectorAll('.prov-item.active').forEach(i => i.scrollIntoView({block:'nearest'}));
  Object.entries(pathEls).forEach(([n, el]) => {
    el.setAttribute('stroke-opacity', n === name ? '1' : '0.5');
    el.setAttribute('stroke-width', n === name ? '1.5' : '0.6');
  });
}

function filterList() {
  const q = document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('.prov-item').forEach(i => {
    i.style.display = i.dataset.name.toLowerCase().includes(q) ? '' : 'none';
  });
}

function toggleCities() {
  citiesOn = !citiesOn;
  gCities.style.display = citiesOn ? '' : 'none';
  document.getElementById('btn-cities').textContent = citiesOn ? '🏙 Ocultar ciudades' : '🏙 Mostrar ciudades';
}

// Pan & zoom
const svg = document.getElementById('map');
let vx=0,vy=0,vw=660,vh=860,dragging=false,startX,startY,startVx,startVy;
svg.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 1.12 : 0.89;
  const rect = svg.getBoundingClientRect();
  const mx = (e.clientX-rect.left)/rect.width*vw+vx;
  const my = (e.clientY-rect.top)/rect.height*vh+vy;
  vw*=factor; vh*=factor;
  vx=mx-((e.clientX-rect.left)/rect.width*vw);
  vy=my-((e.clientY-rect.top)/rect.height*vh);
  svg.setAttribute('viewBox',`${vx} ${vy} ${vw} ${vh}`);
},{passive:false});
svg.addEventListener('mousedown', e => {dragging=true;startX=e.clientX;startY=e.clientY;startVx=vx;startVy=vy;});
window.addEventListener('mousemove', e => {
  if(!dragging)return;
  const rect=svg.getBoundingClientRect();
  vx=startVx-(e.clientX-startX)/rect.width*vw;
  vy=startVy-(e.clientY-startY)/rect.height*vh;
  svg.setAttribute('viewBox',`${vx} ${vy} ${vw} ${vh}`);
});
window.addEventListener('mouseup', ()=>dragging=false);
</script>
