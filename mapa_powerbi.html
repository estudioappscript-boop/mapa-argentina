  let h=`<div class="tt">${name}</div>`;
  if(pop!=null){
    h+=`<div class="ts">Ciudad</div><div class="tr"><span class="tk">Población</span><span class="tv">${pop.toLocaleString('es-AR')}</span></div>`;
  } else {
    h+=`<div class="ts">Provincia</div><div class="tr"><span class="tk">${LABEL}</span><span class="tv">${val!==undefined?val:'—'}</span></div>`;
  }
  tip.innerHTML=h;tip.style.opacity='1';
  tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-10)+'px';
}
function hideTip(){tip.style.opacity='0';}

// Pan & zoom
const svg=document.getElementById('map');
let vx=0,vy=0,vw=660,vh=860,drag=false,sx,sy,svx,svy;
svg.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY>0?1.1:0.91;
  const rect=svg.getBoundingClientRect();
  const mx=(e.clientX-rect.left)/rect.width*vw+vx;
  const my=(e.clientY-rect.top)/rect.height*vh+vy;
  vw*=f;vh*=f;
  vx=mx-(e.clientX-rect.left)/rect.width*vw;
  vy=my-(e.clientY-rect.top)/rect.height*vh;
  svg.setAttribute('viewBox',`${vx} ${vy} ${vw} ${vh}`);
},{passive:false});
svg.addEventListener('mousedown',e=>{drag=true;sx=e.clientX;sy=e.clientY;svx=vx;svy=vy;e.preventDefault();});
window.addEventListener('mousemove',e=>{
  if(!drag)return;
  const rect=svg.getBoundingClientRect();
  vx=svx-(e.clientX-sx)/rect.width*vw;
  vy=svy-(e.clientY-sy)/rect.height*vh;
  svg.setAttribute('viewBox',`${vx} ${vy} ${vw} ${vh}`);
});
window.addEventListener('mouseup',()=>drag=false);
</script>
